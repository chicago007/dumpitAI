# Supabase local config (dumpitAI 전용)
# supabase link --project-ref <YOUR_PROJECT_REF> 실행 후 project_id 자동 채워짐

project_id = "YOUR_DUMPITAI_PROJECT_REF"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]

[auth.email]
enable_signup = true
enable_confirmations = false
